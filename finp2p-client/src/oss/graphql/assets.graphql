query GetAssets($filter: [Filter!]) {
    assets(filter: $filter) {
        nodes {
            id
            name
            type
            organizationId
            denomination {
                code
            }
            issuerId
            config
            allowedIntents
            financialIdentifier {
                type,
                value
            }
            certificates {
                nodes {
                    id
                    profileId
                    type
                    data
                    expiry
                }
            }
            regulationVerifiers {
                id,
                name,
                provider
            }
            policies {
                proof {
                    ... proofInfo
                }
            }
            ledgerAssetInfo {
                ...assetInfo
            }
            orgSettlementAccount {
                wallet {
                    type
                    address
                }
            }
            intents {
                nodes {
                    id
                    remainingQuantity
                    status
                    type
                    start
                    end
                    intent {
                        __typename
                        ... on PrimarySale {
                            settlementTerm {
                                details {
                                    ... on PartialSettlement { unitValue }
                                    ... on FullSettlement { amount }
                                }
                            }
                        }
                        ... on SellingIntent {
                            settlementTerm {
                                details {
                                    ... on PartialSettlement { unitValue }
                                    ... on FullSettlement { amount }
                                }
                            }
                        }
                        ... on BuyingIntent {
                            settlementTerm {
                                details {
                                    ... on PartialSettlement { unitValue }
                                    ... on FullSettlement { amount }
                                }
                            }
                        }
                    }
                }
            }
        }
    }
}

fragment proofInfo on ProofPolicy {
    ... on NoProofPolicy {
        type: __typename
    }
    ... on SignatureProofPolicy {
        type: __typename
        verifyingKey
        signatureTemplate
    }
}

fragment assetInfo on LedgerAssetInfo {
    ledgerIdentifier {
        ... on Caip19Identifier {
            network
            standard
            tokenId
        }
    }
    ledgerReference {
        ... on ContractDetails {
            network
            address
            tokenStandard
            additionalContractDetails {
                finP2PEVMOperatorDetails {
                    finP2POperatorContractAddress
                    allowanceRequired
                }
            }
        }
    }
}
