query GetPlans($filter: [Filter!]) {
    plans(filter: $filter) {
        nodes {
            ...planFields
        }
    }
}

fragment planFields on ExecutionPlan {
    id
    status
    creationTimestamp
    lastModified
    version
    organizations {
        organizationId
    }
    intent {
        id
        type
        status
        remainingQuantity
        start
        end
        intent { __typename }
        metadata { acl }
    }
    contract {
        investors {
            investor
            role
        }
        contractDetails {
            ...contractDetailsFields
        }
    }
    approvals {
        planId
        orgId
        status
        statusInfo { __typename }
    }
    instructions {
        ...instructionFields
    }
}

fragment contractDetailsFields on ExecutionPlanContractDetails {
    __typename
    ... on BuyingContractDetails {
        asset { ...assetOrderFields }
        settlement { ...assetOrderFields }
    }
    ... on SellingContractDetails {
        asset { ...assetOrderFields }
        settlement { ...assetOrderFields }
    }
    ... on IssuanceContractDetails {
        asset { ...assetOrderFields }
        settlement { ...assetOrderFields }
    }
    ... on RedemptionContractDetails {
        asset { ...assetOrderFields }
        settlement { ...assetOrderFields }
    }
    ... on TransferContractDetails {
        asset { ...assetOrderFields }
    }
    ... on LoanContractDetails {
        asset { ...loanOrderFields }
        settlement { ...loanOrderFields }
    }
    ... on PrivateOfferContractDetails {
        asset { ...assetOrderFields }
        settlement { ...assetOrderFields }
    }
    ... on RequestForTransferContractDetails {
        asset { ...assetOrderFields }
    }
}

fragment assetOrderFields on AssetOrder {
    term {
        amount
    }
    instruction {
        sourceAccount { ...ledgerAccountAssetFields }
        destinationAccount { ...ledgerAccountAssetFields }
    }
}

fragment loanOrderFields on LoanOrder {
    term {
        amount
    }
    instruction {
        borrowerAccount { ...ledgerAccountAssetFields }
        lenderAccount { ...ledgerAccountAssetFields }
    }
}

fragment ledgerAccountAssetFields on LedgerAccountAsset {
    finp2pAccount {
        asset {
            resourceId
        }
        account {
            finId
            orgId
        }
    }
    networkAccount {
        wallet {
            type
            address
        }
    }
}

fragment instructionFields on ExecutionPlanInstruction {
    sequence
    organizations {
        organizationId
    }
    status
    version
    details {
        __typename
        ... on HoldInstruction {
            holdSource: source { ...ledgerAccountAssetFields }
            holdDestination: destination { ...ledgerAccountAssetFields }
            amount
        }
        ... on TransferInstruction {
            transferSource: source { ...ledgerAccountAssetFields }
            transferDestination: destination { ...ledgerAccountAssetFields }
            amount
        }
        ... on ReleaseInstruction {
            releaseSource: source { ...ledgerAccountAssetFields }
            releaseDestination: destination { ...ledgerAccountAssetFields }
            amount
        }
        ... on RevertHoldInstruction {
            holdInstructionSequence
            revertDestination: destination { ...ledgerAccountAssetFields }
        }
        ... on IssueInstruction {
            issueSource: source { ...ledgerAccountAssetFields }
            issueDestination: destination { ...ledgerAccountAssetFields }
            amount
        }
        ... on RedeemInstruction {
            redeemSource: source { ...ledgerAccountAssetFields }
            amount
        }
        ... on AwaitInstruction {
            waitTime
        }
    }
    state {
        __typename
        ... on SuccessState {
            output {
                ...receiptFields
            }
        }
        ... on ErrorState {
            code
            message
        }
    }
    approvals {
        nodes {
            planId
            sequence
            orgId
            status
            reason
        }
    }
    transitions {
        onSuccess { ...transitionFields }
        onFailure { ...transitionFields }
        onTimeout { ...transitionFields }
    }
}

fragment receiptFields on SuccessStateOutput {
    __typename
    ... on Receipt {
        id
        operationId
        transactionId
        operationType
        source
        destination
        sourceAccount { ...ledgerAccountAssetFields }
        destinationAccount { ...ledgerAccountAssetFields }
        quantity
        timestamp
        status
    }
}

fragment transitionFields on Transition {
    __typename
    ... on SequenceTransition { sequence }
    ... on StatusTransition { status }
}
