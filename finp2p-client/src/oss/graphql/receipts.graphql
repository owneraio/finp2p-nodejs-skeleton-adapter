query GetReceipts($filter: [Filter!]) {
    receipts(filter: $filter) {
        nodes {
            id
            operationId
            operationType
            quantity
            status
            timestamp
            transactionId
            source
            destination
            sourceAccount {
                ... ledgerAccountAsset
            }
            destinationAccount {
                ... ledgerAccountAsset
            }
        }
    }
}

fragment ledgerAccountAsset on LedgerAccountAsset {
    finp2pAccount {
        asset {
            resourceId
        }
        account {
            finId
            orgId
        }
    }
    networkAccount {
        wallet {
            type
            address
        }
    }
}
