query GetReceipts($filter: [Filter!]) {
    receipts(filter: $filter) {
        nodes {
            id
            operationId
            operationType
            quantity
            status
            timestamp
            transactionId
            source
            destination
            sourceAccount {
                ... ledgerAccountAsset
            }
            destinationAccount {
                ... ledgerAccountAsset
            }
            proof {
                __typename
                ... on SignatureProof {
                    signature {
                        signature
                        hashFunction
                        templateType
                    }
                }
            }
        }
    }
}

fragment ledgerAccountAsset on LedgerAccountAsset {
    finp2pAccount {
        asset {
            resourceId
            ledgerIdentifier {
                __typename
                ... on Caip19Identifier {
                    network
                    standard
                    tokenId
                }
            }
        }
        account {
            finId
            orgId
            custodian {
                orgId
            }
        }
    }
    networkAccount {
        wallet {
            type
            address
        }
    }
}
