}

type BuyingContractDetails {
    asset: AssetOrder!
    settlement: AssetOrder
}

type SellingContractDetails {
    asset: AssetOrder!
    settlement: AssetOrder
}

type LoanContractDetails {
    asset: LoanOrder!
