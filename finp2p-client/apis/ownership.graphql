type TransferContractDetails {
    asset: AssetOrder!
}

type RedemptionContractDetails {
    asset: AssetOrder!
    settlement: AssetOrder
}

type PrivateOfferContractDetails {
    asset: AssetOrder!
    settlement: AssetOrder
}

type RequestForTransferContractDetails {
    asset: AssetOrder!
}

type AssetOrder {
    term: AssetOrderTerm!
    instruction: AssetOrderInstruction!
}

type LoanOrder {
    term: AssetOrderTerm!
    instruction: LoanOrderInstruction!
}

type AssetOrderTerm {
    amount: String!
}

type AssetOrderInstruction {
    sourceAccount: LedgerAccountAsset
    destinationAccount: LedgerAccountAsset
}

type LoanOrderInstruction {
    borrowerAccount: LedgerAccountAsset
    lenderAccount: LedgerAccountAsset
}

enum ApprovalStatus {
    Approved
    Rejected
    Unknown
}

type PlanApprovalStatusInfo {
    code: Int!
    message: String!
}

type PlanApproval {
    planId: String!
    orgId: String!
    status: ApprovalStatus!
    statusInfo: PlanApprovalStatusInfo!
}

type InstructionApproval {
    planId: String!
    sequence: Int!
    orgId: String!
    status: String!
    reason: String!
}

union InstructionDetails = IssueInstruction | TransferInstruction | HoldInstruction | ReleaseInstruction | RevertHoldInstruction | AwaitInstruction | RedeemInstruction

union InstructionCompletionState = UnknownState | ErrorState | SuccessState

enum ExecutionPlanInstructionStatus {
    Unknown
    Pending
    Completed
    Failed
    Approved
    Rejected
    Cancelled
}

type ExecutionPlanInstruction {
    sequence: Int!
