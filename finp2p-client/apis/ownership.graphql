type SequenceTransition {
    sequence: Int!
}

type IssueInstruction {
    "source for issuance"
    source: LedgerAccountAsset

    "destination account for issuance"
    destination: LedgerAccountAsset!

    "asset's issuance amount"
    amount: String!
}

type TransferInstruction {
    "source account information"
    source: LedgerAccountAsset!

    "destination account information"
    destination: LedgerAccountAsset!

    "asset's transfer amount"
    amount: String!
}

type HoldInstruction {
    "source account information"
    source: LedgerAccountAsset!

    "destination account information"
    destination: LedgerAccountAsset

    "asset's hold amount"
    amount: String!
}

type ReleaseInstruction {
    "source account information"
    source: LedgerAccountAsset!

    "destination account information"
    destination: LedgerAccountAsset!

    "asset's release amount"
    amount: String!
}

type RevertHoldInstruction {
    "destination account information"
    destination: LedgerAccountAsset!
