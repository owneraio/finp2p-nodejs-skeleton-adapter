"Organization's information."
type Organization {
    id: String!

    "Organization's supported types, e.g. Primary, Escrow"
    types: [String!]

    "Organization's name on the finp2p network."
    name: String!

    "Organization's finp2p public key represented as a hexadecimal string."
    finId: String!

    "Organization's cluster id."
    clusterId: String!

    "Assets which the Organization act as the Primary Node."
    assets(filter : [Filter!], aggregates: [Aggregate!], paginate: PaginateInput = {}): Assets!

    "Users which the Organization act as the Primary Node."
    users(filter : [Filter!], aggregates: [Aggregate!], paginate: PaginateInput = {}): Users!
}

"Profile interface."
interface Profile {
    id: String!

    "Collection of certificates associated with the Profile."
    certificates(filter : [Filter!], aggregates: [Aggregate!]): Certificates!

    "Organization id to which this profile is associated with."
    organizationId: String!

    "Profile metadata, contains ACL information of the profile."
    metadata: ProfileMetadata!
}

enum IntentTypes {
    PRIMARY_SALE
    BUYING
    SELLING
    LOAN
    PRIVATE_OFFER
    REQUEST_FOR_TRANSFER
}


"Represents an Asset in the network."
type Asset implements Profile  {
    id: String!

    "Collection of certificates associated with the Profile."
    certificates(filter : [Filter!], aggregates: [Aggregate!]): Certificates!

    "Collection of Intents associated with the Asset."
    intents(filter : [Filter!], aggregates: [Aggregate!]): Intents!

    name: String!

    symbol: String

    "Type of Asset (Share, Debt etc..)"
    type: String!

    "Custom configuration for the Asset."
    config: String!

    "Tokens issued for the given Asset."
    issuedTokens(filter : [Filter!], aggregates: [Aggregate!]): TokensBalances!

    "Issuer profile of the Asset."
    issuerId: String!

    "Regulation Verifiers associated with the Asset."
    regulationVerifiers: [Verifier!]

    "Organization id to whom this profile is associated with."
    organizationId: String!

    "Profile metadata, contains ACL information of the profile."
    metadata: ProfileMetadata!

    "Denomination currency of the Asset"
    denomination: FiatAsset!

    "Allowed intent types to be used on the asset"
    allowedIntents: [IntentTypes!]

    "Describe the policies active on the asset"
    policies: AssetPolicies

    "ledgerAssetInfo information"
    ledgerAssetInfo: LedgerAssetInfo

    "classification standard used to identify the financial asset"
    financialIdentifier: FinancialIdentifier

    "asset resource version"
    version: String!

    "to fallback to default allowed policy if no specific policy is set"
    allowPolicyDefaultFallback: Boolean!

    "decimal places for the asset"
    decimalPlaces: Int!

    "whether the asset is auto-shared"
    autoShare: Boolean!

    "omnibus account for the asset, if applicable"
    orgSettlementAccount: NetworkAccount
}

type LedgerAssetInfo {
    ledgerIdentifier: LedgerIdentifier
    ledgerReference: LedgerReference
    ledgerBinding: LedgerBinding
}

enum LedgerAuthType {
    OAUTH
    MTLS
    API_KEY
}

type LedgerBindings {
    "Collection of Ledger Binding Objects, conforms to the Filter input if provided."
    nodes: [LedgerBinding!]

    "Keeps pagination info in-case limit input wes provided"
    pageInfo: PageInfo
}

type LedgerBinding {
    name: String!
    endpoint: String!
    idempotency: LedgerIdempotencyOptions
    displayName: String
    requestTimeout: String!
    backoff: String!
    singleRequestTimeout: String!
    balanceSyncAllowed: Boolean!
}

type LedgerIdempotencyOptions {
    idempotent: Boolean!
    transientFailureCodes: [String!]!
}

union LedgerAuthOptions = LedgerOAuthOptions | LedgerMtlsOptions | LedgerApiKeyOptions

type LedgerOAuthOptions {
    oauthClientId: String!
    oauthClientSecret: String!
    oauthServerEndpoint: String!
    alg: String!
    jwtKey: String!
}

type LedgerMtlsOptions {
    clientCertificate: String!
    caCertificate: String!
    key: String!
}

type LedgerApiKeyOptions {
    apiKey: String!
}

type CustodyProviders {
    "Collection of Custody Provider Objects, conforms to the Filter input if provided."
    nodes: [CustodyProvider!]

    "Keeps pagination info in-case limit input was provided"
    pageInfo: PageInfo
}

type CustodyProvider {
    name: String!
    endpoint: String!
    displayName: String
    idempotency: LedgerIdempotencyOptions
    requestTimeout: String!
    backoff: String!
    singleRequestTimeout: String!
}


union LedgerReference = ContractDetails

type ContractDetails {
    network: String!
    address: String!
    tokenStandard: String
    additionalContractDetails: AdditionalContractDetails
}

type AdditionalContractDetails {
    finP2PEVMOperatorDetails: FinP2PEVMOperatorDetails
}

type FinP2PEVMOperatorDetails {
    finP2POperatorContractAddress: String!
    allowanceRequired: Boolean!
}

"Regulation Verifier"
type Verifier {
    "Verifier ID"
    id: String

    "Verifier Name"
    name: String

    "Provider type: REG_APP_STORE, OTHER"
    provider: String
}

"Represents an Issuer in the network."
type Issuer  {
    id: String!

    "Assets issued by the Issuer."
    assets(filter : [Filter!], aggregates: [Aggregate!], paginate: PaginateInput = {}): Assets!

    outbox(filter : [Filter!]): OutgoingMessages
}

"Represents an User in the network."
type User implements Profile  {
    id: String!

    "Collection of certificates associated with the Profile."
    certificates(filter : [Filter!], aggregates: [Aggregate!]): Certificates!

    name: String!

    holdings(filter : [Filter!], aggregates: [Aggregate!]): Holdings!

    "Organization id to whom this profile is associated with."
    organizationId: String!

    "Profile metadata, contains ACL information of the profile."
    metadata: ProfileMetadata!

    "finIds keys associated with this investor"
    finIds: [String!]

    accounts(filter: [Filter!]): [FinP2PAccount!]

    "User's associated messages"
    #    inbox(filter : [Filter!]): [IncomingMessage!]!
    inbox(filter : [Filter!]): Messages!

    "user resource version"
    version: String!

    "Data access permissions this resource has received from other organizations"
    dataAccessReceived: [String]
}

type OutgoingMessages {
    nodes: [OutgoingMessage!]
}

type Messages {
    nodes: [Message!]
}

type Message {
    id: String!
    subject: String! #Q: is subject and body always relevant for any communication type? (email, SMS, notification)
    body: String!
    # TODO: [IC-P3] improve
    timestamp: String!
    attachments: [Attachment!]! #Q: attachments may not be relevant to different communication types
    correspondent: Correspondent! ## Source as FinID account ?
}

type IncomingMessage {
    message : Message
}


type OutgoingMessage {
    message: Message

    # Message recipients
    recipients(filter : [Filter!]): MessageRecipients!
}

type MessageRecipients {
    "Collection of User Objects, conforms to the Filter input if provided."
    nodes: [MessageRecipient!]
}

union DeliveryStatus =  PendingDelivery | Delivered | NotDelivered

type PendingDelivery {
    _ignore: Boolean
}

type Delivered {
    _ignore: Boolean
}

type NotDelivered {
    # non delivery reason
    status : String!
}

type MessageRecipient {
    destination: Recipient!
    deliveryStatus: DeliveryStatus
}

type Attachment {
    uuid: String!
    name: String
    link: String
    messageId: String!
}


union Correspondent = AssetIssuer
union Recipient  = Investor

type AssetIssuer {
    issuerId: String!
    assetId: String!
}

type Investor {
    resourceId: String!
}

type Holdings {
    "Collection of Funds balance objects, conforms to the Filter input if provided."
    nodes: [Holding!]
    "Collection of Aggregate Results, if an Aggregate input was provided."
    aggregate: [AggregateResult!]
}

type Holding {
    account: FinP2PAccount!
    assetType: AssetType!
    asset: AssetDetails!
    balance: String! ## calculated balance based on asset's receipt
    withheldBalance: String! ## calculated available balance based on asset's receipt
    availableBalance: String! ## calculated held balance based on asset's receipt
    balanceTimestamp: Int! ##  epoch seconds timestamp of last balance synchronization
    syncedBalance: String! ## balance synced from ledger
    syncedAvailableBalance: String! ## available balance synced from ledger
    syncedHeldBalance: String! ## held balance synced from ledger
}

"FinP2P account - represents a user account in the FinP2P network"
type FinP2PAccount {
    "FinId -- a user's public key represented as a hexadecimal string"
    finId: String!
    "Organization id of the account"
    orgId: String!
    "Custodian for the finId"
    custodian: Custodian
}

type Custodian {
    orgId: String!
}

"Represents an Asset token balance information."
type TokenBalance {
    userId: String!
    assetId: String!
    quantity: String!
    transactionsDetails: [TransactionDetails!]
}

type TransactionDetails {
    transactionId: String!
    index: Int!
    quantity: String!
}

type Receipt {
    id: String!

    "Source owner resource ID"
    source: String

    "Source account of transaction"
    sourceAccount: LedgerAccountAsset

    "Destination owner resource ID"
    destination: String

    "Destination account of transaction"
    destinationAccount: LedgerAccountAsset

    "Number of asset units with the transaction"
    quantity: String!

    "Trade details associated with the transaction"
    tradeDetails: TradeDetails

    "Operation id"
    operationId: String

    "Underlying transaction id"
    transactionId: String

    "Operation type"
    operationType: OperationType

    "Receipt timestamp"
    timestamp: String!

    "Receipt status"
    status: ReceiptStatus!

    "Ledger proof"
    proof: Proof
}

union Proof = NoProof | SignatureProof

type NoProof {
    _ignore: Boolean
}

type SignatureProof {
    signature: Signature!
}

type Signature {
    template: Template!
    signature: String!
    hashFunction: String!
    templateType: templateType!
}

enum templateType {
    EIP712Template
    HashListTemplate
}

union Template = HashlistTemplate | EIP712Template

type HashlistTemplate {
    hash: String!
    hashGroups: [HashGroup!]!
}

type HashGroup {
    hash: String!
    fields: [Field!]!
}

type Field {
    name: String!
    type: String!
    value: String!
}

type EIP712Template {
    hash: String!
}

enum OperationType {
    Unknown
    Issue
    Transfer
    Release
    Hold
    Redeem
}

type TradeDetails {
    "Intent  associated with the transaction"
    intent: Intent

    "Details of ExecutionPlan associated with the transaction"
    executionContext: ExecutionContext
}

type ExecutionContext {
    "ExecutionPlan associated with the transaction"
    executionPlanId: String

    "The associated instruction sequence number"
    instructionSequenceNumber: Int
}

"Represents a Certificate in the network."
type Certificate {
    id: String!

    "Profile to whom this Certificate is associate with."
    profileId: String!

    "Type of Certificate (KYA,KYC,AML etc.. )."
    type: String!

    "Service Provider Id which provided the Certificate."
    providerId : String!

    issuedAt: Int!
    expiry: Int

    "Semi-Structured Data provided as additional information for the Certificate."
    data: String

    "Certificate associated documents metadata."
    documents(filter : [Filter!]): Documents!
}


"Represent an Asset's Transaction Intent occasion in which the Asset's tokens are issued."
type Intent {
    id: String!

    "Start time of the intent."
    start: Int!

    "End time of the intent."
    end: Int!

    "Intent status"
    status: IntentStatus!

    "Remaining quantity in the transaction."
    remainingQuantity: String!

    "Intent type: primary sale, buying or selling intent"
    type: String!

    "Intent data"
    intent: IntentDetails

    "Profile metadata, contains ACL information of the profile."
    metadata: ProfileMetadata!

    "intent resource version"
    version: String!
}


enum IntentStatus {
    ACTIVE
    NON_ACTIVE
    CANCELLED
    COMPLETED
    EXPIRED
    REJECTED
}

type AssetTerm {
    "Total amount of asset allocated"
    amount: String!
}


"Account identifier - supports FinP2P, crypto wallets, and IBAN"
union AccountIdentifier = CryptoWalletAccount | Iban | FinP2PAccount

"FinP2P asset account - combines asset info with account info (matches proto FinP2PAssetAccount)"
type FinP2PAssetAccount {
    "FinP2P asset information"
    asset: FinP2PAsset

    "FinP2P account information"
    account: FinP2PAccount
}

"Crypto wallet account"
type CryptoWalletAccount {
    "Wallet address represented as a hexadecimal string prefixed with 0x"
    address: String!
}

"IBAN bank account"
type Iban {
    "IBAN code"
    code: String!
}

"Ledger account asset - combines FinP2P account with optional network account"
type LedgerAccountAsset {
    "FinP2P asset account"
    finp2pAccount: FinP2PAssetAccount!

    "Network account (e.g., wallet)"
    networkAccount: NetworkAccount
}

"Network account - represents external network accounts like wallets"
type NetworkAccount {
    "Wallet account if present"
    wallet: WalletAccount
}

"Wallet account for blockchain wallets"
type WalletAccount {
    "Type of wallet (e.g., ethereum)"
    type: String!

    "Wallet address"
    address: String!
}

"FinP2P asset with resource ID and ledger identifier"
type FinP2PAsset {
    "Resource ID of the FinP2P asset"
    resourceId: String!

    "Ledger identifier for the asset"
    ledgerIdentifier: LedgerIdentifier
}

"CAIP-19 format ledger identifier"
type Caip19Identifier {
    "CAIP-2 network identifier (e.g., eip155:1, solana:mainnet)"
    network: String!
    "Token standard (e.g., erc20, erc721)"
    standard: String!
    "Token ID or contract address"
    tokenId: String!
}

"Ledger identifier union - currently only CAIP-19 supported"
union LedgerIdentifier = Caip19Identifier

"Fiat currency asset for denomination purposes"
type FiatAsset {
    "ISO-4217 code of the fiat currency"
    code: String!
}

"Asset details - now always FinP2P"
union AssetDetails = FinP2PAsset

union SettlementTermOptionType = PartialSettlement | FullSettlement | NoSettlement

type PartialSettlement {
    unitValue: String!
}

type FullSettlement {
    amount: String!
}

type NoSettlement {
    _ignore: Boolean
}

type SettlementTerm {
    details: SettlementTermOptionType!
}

type SettlementInstruction {
    details: SettlementInstructionTypeDetails!
}

union SettlementInstructionTypeDetails = SellingSettlementInstruction | BuyingSettlementInstruction

type SellingSettlementInstruction {
    "Destination accounts where seller receives payment"
    accounts: [FinP2PAssetAccount!]
}

type BuyingSettlementInstruction {
    "Source account where buyer pays from"
    account: FinP2PAssetAccount
}

type RedemptionSettlementInstruction {
    "Source accounts where payment comes from"
    accounts: [FinP2PAssetAccount!]
}

type RedemptionConditions {
    redemptionDuration: String!
}

enum AssetType {
    finp2p,
    fiat,
    cryptocurrency
}

enum ExecutionPlanStatus {
    Unknown
    Pending
    Approved
    Completed
    Failed
    Rejected
    Halted
    InProgress
    Cancelled
}

type ExecutionPlan {
    "resource id of execution plan"
    id: String!

    "Intent associated with execution plan"
    intent: Intent

    "organizations which participate in the execution plan"
    organizations: [ExecutionOrganization!]!

    "lifecycle status of the execution plan"
    status: ExecutionPlanStatus!

    "plan's list of instructions"
    instructions: [ExecutionPlanInstruction]!

    "plan's contract details"
    contract: ExecutionPlanContract!

    "list of plan approvals"
    approvals: [PlanApproval]!

    "plan creation (timestamp in sec)"
    creationTimestamp: Int!

    "last time plan was modified (epoch time seconds)"
    lastModified: Int!

    "version of the execution plan"
    version: Int!
}

type ExecutionPlanContract {
    investors: [ExecutionPlanInvestor!]!
    contractDetails: ExecutionPlanContractDetails
}

type ExecutionPlanInvestor {
    investor: String! # resource id of the investor
    role: InvestorRole!
}

enum InvestorRole {
    BUYER
    SELLER
    LENDER
    BORROWER
    ISSUER
}

union ExecutionPlanContractDetails = IssuanceContractDetails | BuyingContractDetails | SellingContractDetails | LoanContractDetails
    | TransferContractDetails | RedemptionContractDetails | PrivateOfferContractDetails | RequestForTransferContractDetails

type IssuanceContractDetails {
    asset: AssetOrder!
