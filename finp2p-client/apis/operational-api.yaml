openapi: 3.0.1
info:
  title: Operational API
  description: This is the operational API reference for adapter development.
  termsOfService: 'https://ownera.io/terms/'
  contact:
    email: support@ownera.io
  version: x.x.x
tags:
  - name: ledger
    description: Sync operations between ledger adapter and finp2p node
  - name: execution
    description: Execution plan related operational APIs
  - name: custody
    description: Sync operations between custody adapter and finp2p node
  - name: operation
    description: sync long running operation results with the finp2p node
  - name: workflow
    description: Workflow administration and control operations
  - name: discovery
    description: Discovery service operations

paths:
  /workflow/cancel:
    post:
      tags:
        - workflow
      summary: Cancel workflow
      description: Cancel workflow - this method is deprecated, use /workflow/{workflowId}/cancel
      operationId: cancelWorkflow
      deprecated: true

      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            $ref: 'common-external-components.yaml#/components/schemas/nonce'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/cancelWorkflow'

      responses:
        '200':
          description: workflow queued for cancelling

  '/workflow/{workflowId}/retry':
    post:
      tags:
        - workflow
      summary: 'Retry workflow'
      description: 'Resets a workflow when it is hanging'
      operationId: retryWorkflow
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            $ref: 'common-external-components.yaml#/components/schemas/nonce'
        - name: workflowId
          in: path
          description: 'Unique identifier of the workflow to retry'
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        description: 'Retry workflow request'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workflowRetryRequest'
      responses:
        '202':
          description: 'Retry request accepted'
          content:
            application/json:
              schema:
                $ref: 'common-external-components.yaml#/components/schemas/OperationBase'

  '/workflow/{workflowId}/reset':
    post:
      tags:
        - workflow
      summary: 'Reset workflow to a specific state'
      description: 'Resets a workflow to a specific state, clearing intermediate data and continuing from the reset point'
      operationId: resetWorkflow
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            $ref: 'common-external-components.yaml#/components/schemas/nonce'
        - name: workflowId
          in: path
          description: 'Unique identifier of the workflow to reset'
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        description: 'Reset workflow request'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workflowResetRequest'
      responses:
        '202':
          description: 'Reset request accepted'
          content:
            application/json:
              schema:
                $ref: 'common-external-components.yaml#/components/schemas/OperationBase'

  '/workflow/{workflowId}/cancel':
    post:
      tags:
        - workflow
      summary: 'Cancel workflow execution'
      description: 'Cancels a workflow, stopping its execution permanently'
      operationId: cancelWorkflowById
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            $ref: 'common-external-components.yaml#/components/schemas/nonce'
        - name: workflowId
          in: path
          description: 'Unique identifier of the workflow to cancel'
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        description: 'Cancel workflow request'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/workflowCancelRequest'
      responses:
        '202':
          description: 'Cancel request accepted'
          content:
            application/json:
              schema:
                $ref: 'common-external-components.yaml#/components/schemas/OperationBase'


  /operations/callback/{cid}:
    post:
      tags:
        - operation
      summary: callback operation
      operationId: callback operation
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            $ref: 'common-external-components.yaml#/components/schemas/nonce'
        - name: cid
          in: path
          description: correlation id of operation
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/operationStatusCallback'
      responses:
        '200':
          description: successful operation

  /execution/proposals:
    put:
      tags:
        - execution
      summary: Override approvals config
      description: Override approvals config
      operationId: Override approvals config
      requestBody:
        content:
          application/json:
            example:
              ownerId: "bank-x:101:511c1d7f-4ed8-410d-887c-a10e3e499a01"
              tokenization:
                http-endpoint-1:
                  config_type: "http"
                  endpoint: "http://approver-service.internal/approvals"
                  timeout: "45s"
                  proposals:
                    - "reset"
                    - "cancel"
                    - "instruction"
                ledger-approver-1:
                  config_type: "ledger"
                  name: "ledger-approver-1"
                  proposals:
                    - "reset"
                    - "instruction"
              payments:
                ledger-approver-2:
                  config_type: "ledger"
                  name: "payments-ledger-approver"
                  proposals:
                    - "instruction"
            schema:
              $ref: '#/components/schemas/approvalConfig'
      responses:
        '201':
          description: Created the new configuration successfully
    patch:
      tags:
        - execution
      summary: Update approvals config
      description: Update approvals config
      operationId: update approvals config
      requestBody:
        content:
          application/json:
            examples:
                update-example-1:
                    summary: disable http-endpoint-1, change proposals of ledger-approver-1 and delete payments config
                    value:
                      ownerId: "bank-x:101:511c1d7f-4ed8-410d-887c-a10e3e499a01"
                      tokenization:
                        http-endpoint-1:
                          config_type: "http"
                          disabled: true
                        ledger-approver-1:
                          config_type: "ledger"
                          proposals:
                            - "cancel"
                      payments: null
            schema:
              $ref: '#/components/schemas/approvalConfigUpdate'
      responses:
        '200':
          description: Configuration updated successfully

  /discovery/pinning_config:
    put:
      tags:
        - discovery
      summary: Set pinning configuration
      description: Set pinning configuration, overriding any existing configuration
      operationId: setPinningConfig
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            $ref: 'common-external-components.yaml#/components/schemas/nonce'
      requestBody:
        content:
          application/json:
            examples:
                pinning-config-example-1:
                  value:
                    bank-uk:
                      token: "<token>"
                      address:
                        - address: bank-uk.finp2p.local.ownera.io
                          port: 80
                          schemas:
                            - http1.1
                            - http2
                    ownera-custody:
                      token: "<token>"
                      address:
                        - address: ownera-custody.finp2p.local.ownera.io
                          port: 80
                          schemas:
                            - http1.1
                    ownera-escrow:
                      token: "<token>"
                      address:
                        - address: ownera-escrow.api-mock.local.ownera.io
                          port: 80
                          schemas:
                            - http1.1
            schema:
              $ref: '#/components/schemas/pinningConfig'
      responses:
        '201':
          description: successful operation
    patch:
      tags:
        - discovery
      summary: Update pinning configuration, add/remove/modify entries
      description: Update pinning configuration
      operationId: updatePinningConfig
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            $ref: 'common-external-components.yaml#/components/schemas/nonce'
      requestBody:
        content:
          application/json:
            examples:
              pinning-config-update-example-1:
                description: |
                  * Removes bank-uk configuration
                  * Updates ownera-custody address
                  * Updates ownera-escrow token
                  * Adds bank-us configuration
                value:
                  bank-uk: null
                  ownera-custody:
                    address:
                      - address: ownera-custody.finp2p.local.ownera.io
                        port: 80
                        schemas:
                          - http1.1
                  ownera-escrow:
                    token: "<token>"
                  bank-us:
                    token: "<token>"
                    address:
                      - address: bank-us.finp2p.local.ownera.io
                        port: 80
                        schemas:
                          - http1.1
                          - http2
            schema:
              $ref: '#/components/schemas/pinningConfigUpdate'
      responses:
        '202':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pinningConfig'


  /ledger/transaction/import:
    post:
      tags:
        - ledger
      summary: Import external transactions
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            $ref: 'common-external-components.yaml#/components/schemas/nonce'
      description: Import transactions performed outside of FinP2P
      operationId: import transactions
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - transactions
              properties:
                transactions:
                  type: array
                  items:
                    $ref: '#/components/schemas/transaction'
      responses:
        '200':
          description: successful operation
        '208':
          description: |
            Some transactions were not imported due to duplicate transaction IDs.

  /execution/{planId}:
    get:
      tags:
        - execution
      summary: Get execution plan
      description: Get execution plan
      operationId: getExecutionPlan
      parameters:
        - name: planId
          in: path
          description: ID of the execution plan
          required: true
          schema:
            type: string
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/execution'

  /policies/{policyId}:
    get:
      tags:
        - policies
      summary: Get trading policy
      description: Get trading policy
      operationId: getPolicyById
      parameters:
        - name: policyId
          in: path
          description: ID of the trading policy
          required: true
          schema:
            type: string
      responses:
        '200':
          description: got the policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tradingPolicy'


  /policies/delete/{policyId}:
    delete:
      tags:
        - policies
      summary: Delete trading policy
      description: Delete trading policy
      operationId: deletePolicyById
      parameters:
        - name: policyId
          in: path
          description: ID of the trading policy
          required: true
          schema:
            type: string
      responses:
        '204':
          description: policy deleted
          content: {}
  /policies:
    get:
      tags:
        - policies
      summary: Find trading policies
      description: Find trading policies
      operationId: findPolicies
      parameters:
        - name: assetMatchingType
          in: query
          description: asset matching type
          required: true
          schema:
            type: string
      responses:
        '200':
          description: found some policies
          content:
            application/json:
              schema:
                type: object
                required: [policies]
                properties:
                  policies:
                    type: array
                    items:
                      $ref: '#/components/schemas/tradingPolicy'
  /assets/{assetId}/policies:
    get:
      tags:
        - policies
      summary: Get trading policies of the asset
      description: Get policies of the asset
      operationId: getAssetPoliciesByAssetId
      parameters:
        - name: assetId
          in: path
          description: ID of the asset
          required: true
          schema:
            type: string
      responses:
        '200':
          description: found some policies
          content:
            application/json:
              schema:
                type: object
                required: [ policies ]
                properties:
                  policies:
                    type: array
                    items:
                      $ref: '#/components/schemas/tradingPolicy'


  /policies/update:
    post:
      tags:
        - policies
      summary: Update a policy
      description: Update a policy
      operationId: updatePolicy
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/updatePolicyRequest'
      responses:
        '200':
          description: successful update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/updatePolicyResponse'

  /policies/create:
    post:
      tags:
        - policies
      summary: Create a policy
      description: Create a policy
      operationId: createPolicy
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createPolicyRequest'
      responses:
        '200':
          description: successful creation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createPolicyResponse'

  /custody/bind:
    post:
      tags:
        - custody
      summary: Bind Custody Provider
      description: Define a new custody provider integration. Only one custody provider is supported at a time.
      operationId: bind custody provider
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, endpoint]
              properties:
                name:
                  type: string
                  description: "A unique name for the custody provider. This name will be used to reference the provider in other API calls"
                endpoint:
                  type: string
                  description: "address of custody adapter in host:port format"
                auth:
                  $ref: '#/components/schemas/adapterAuthOptions'
                idempotency:
                  $ref: '#/components/schemas/adapterIdempotencyOptions'
                displayName:
                  type: string
                  description: "display name"
                requestTimeout:
                  type: string
                  pattern: '^-?(?:\d+(?:\.\d+)?h)?(?:\d+(?:\.\d+)?m)?(?:\d+(?:\.\d+)?s)?(?:\d+(?:\.\d+)?ms)?(?:\d+(?:\.\d+)?(us|µs))?(?:\d+(?:\.\d+)?ns)?$'
                  description: "request timeout (e.g. 300s)"
                  default: "300s"
                backoff:
                  type: string
                  pattern: '^-?(?:\d+(?:\.\d+)?h)?(?:\d+(?:\.\d+)?m)?(?:\d+(?:\.\d+)?s)?(?:\d+(?:\.\d+)?ms)?(?:\d+(?:\.\d+)?(us|µs))?(?:\d+(?:\.\d+)?ns)?$'
                  description: "backoff (e.g. 60s)"
                  default: "60s"
                singleRequestTimeout:
                  type: string
                  pattern: '^-?(?:\d+(?:\.\d+)?h)?(?:\d+(?:\.\d+)?m)?(?:\d+(?:\.\d+)?s)?(?:\d+(?:\.\d+)?ms)?(?:\d+(?:\.\d+)?(us|µs))?(?:\d+(?:\.\d+)?ns)?$'
                  description: "single request timeout (e.g. 90s)"
                  default: "90s"
      responses:
        '200':
          description: successful operation

  /custody/{name}/update:
    patch:
      tags:
        - custody
      summary: Update Custody Provider binding
      description: Update a custody provider integration
      operationId: update custody provider binding
      parameters:
        - name: name
          in: path
          description: A unique name for the custody provider
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint:
                  x-custom-format: "nullable"
                  type: string
                  description: "address of custody adapter in host:port format"
                  nullable: true
                displayName:
                  type: string
                  description: "display name"
                  x-custom-format: "nullable"
                  nullable: true
                auth:
                  oneOf:
                    - $ref: '#/components/schemas/adapterAuthOptionsOpt'
                  nullable: true
                  x-custom-format: "nullable+authOptions"
                idempotency:
                  oneOf:
                    - $ref: '#/components/schemas/adapterIdempotencyOptionsOpt'
                  nullable: true
                  x-custom-format: "nullable+idempotencyOptions"
                requestTimeout:
                  type: string
                  description: "request timeout (e.g. 300s)"
                  x-custom-format: "nullable"
                  nullable: true
                  pattern: '^-?(?:\d+(?:\.\d+)?h)?(?:\d+(?:\.\d+)?m)?(?:\d+(?:\.\d+)?s)?(?:\d+(?:\.\d+)?ms)?(?:\d+(?:\.\d+)?(us|µs))?(?:\d+(?:\.\d+)?ns)?$'
                backoff:
                  type: string
                  description: "backoff (e.g. 60s)"
                  x-custom-format: "nullable"
                  nullable: true
                  pattern: '^-?(?:\d+(?:\.\d+)?h)?(?:\d+(?:\.\d+)?m)?(?:\d+(?:\.\d+)?s)?(?:\d+(?:\.\d+)?ms)?(?:\d+(?:\.\d+)?(us|µs))?(?:\d+(?:\.\d+)?ns)?$'
                singleRequestTimeout:
                  type: string
                  description: "single request timeout (e.g. 90s)"
                  x-custom-format: "nullable"
                  pattern: '^-?(?:\d+(?:\.\d+)?h)?(?:\d+(?:\.\d+)?m)?(?:\d+(?:\.\d+)?s)?(?:\d+(?:\.\d+)?ms)?(?:\d+(?:\.\d+)?(us|µs))?(?:\d+(?:\.\d+)?ns)?$'
                  nullable: true
      responses:
        '200':
          description: successful operation

  /ledger/{name}/update:
    patch:
      tags:
        - ledger
      summary: Update Ledger binding
      description: Update a ledger integration
      operationId: update ledger binding
      parameters:
        - name: name
          in: path
          description: Unique identifier for the ledger name. This value must be unique across all ledger bindings
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                endpoint:
                  x-custom-format: "nullable"
                  type: string
                  description: Ledger adapter address in host:port format
                  nullable: true
                requestTimeout:
                  type: string
                  description: The maximum time allowed for the entire request operation to complete, including all retry attempts. After this duration, the request will fail with a timeout error
                  x-custom-format: "nullable"
                  nullable: true
                  pattern: '^-?(?:\d+(?:\.\d+)?h)?(?:\d+(?:\.\d+)?m)?(?:\d+(?:\.\d+)?s)?(?:\d+(?:\.\d+)?ms)?(?:\d+(?:\.\d+)?(us|µs))?(?:\d+(?:\.\d+)?ns)?$'

                backoff:
                  type: string
                  description: The waiting period between consecutive retry attempts when a request fails. This delay helps prevent overwhelming the ledger adapter during temporary failures
                  x-custom-format: "nullable"
                  nullable: true
                  pattern: '^-?(?:\d+(?:\.\d+)?h)?(?:\d+(?:\.\d+)?m)?(?:\d+(?:\.\d+)?s)?(?:\d+(?:\.\d+)?ms)?(?:\d+(?:\.\d+)?(us|µs))?(?:\d+(?:\.\d+)?ns)?$'

                singleRequestTimeout:
                  type: string
                  description: The maximum time allowed for each individual request attempt. If a single attempt exceeds this duration, it will be retried according to the backoff configuration
                  x-custom-format: "nullable"
                  pattern: '^-?(?:\d+(?:\.\d+)?h)?(?:\d+(?:\.\d+)?m)?(?:\d+(?:\.\d+)?s)?(?:\d+(?:\.\d+)?ms)?(?:\d+(?:\.\d+)?(us|µs))?(?:\d+(?:\.\d+)?ns)?$'
                  nullable: true
                auth:
                  oneOf:
                    - $ref: '#/components/schemas/adapterAuthOptionsOpt'
                  nullable: true
                  x-custom-format: "nullable+authOptions"

                idempotency:
                  oneOf:
                    - $ref: '#/components/schemas/adapterIdempotencyOptionsOpt'
                  nullable: true
                  x-custom-format: "nullable+idempotencyOptions"

                displayName:
                  type: string
                  description: A human-readable name for the ledger that appears in user interfaces
                  x-custom-format: "nullable"
                  nullable: true

                balanceSyncAllowed:
                  type: boolean
                  description: "Indicates whether balance synchronization is enabled for this ledger"
                  default: true
                  x-custom-format: "nullable"
                  nullable: true
      responses:
        '200':
          description: successful operation

  /ledger/bind:
    post:
      tags:
        - ledger
      summary: Bind Ledger
      description: Define a new ledger integration
      operationId: bind ledger
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [name, endpoint]
              properties:
                name:
                  type: string
                  description: Unique identifier for the ledger name. This value must be unique across all ledger bindings
                endpoint:
                  type: string
                  description: Ledger adapter address in host:port format
                auth:
                  $ref: '#/components/schemas/adapterAuthOptions'
                idempotency:
                  $ref: '#/components/schemas/adapterIdempotencyOptions'
                displayName:
                  type: string
                  description: A human-readable name for the ledger that appears in user interfaces
                requestTimeout:
                  type: string
                  pattern: '^-?(?:\d+(?:\.\d+)?h)?(?:\d+(?:\.\d+)?m)?(?:\d+(?:\.\d+)?s)?(?:\d+(?:\.\d+)?ms)?(?:\d+(?:\.\d+)?(us|µs))?(?:\d+(?:\.\d+)?ns)?$'
                  description: The maximum time allowed for the entire request operation to complete, including all retry attempts. After this duration, the request will fail with a timeout error
                  default: "300s"
                backoff:
                  type: string
                  pattern: '^-?(?:\d+(?:\.\d+)?h)?(?:\d+(?:\.\d+)?m)?(?:\d+(?:\.\d+)?s)?(?:\d+(?:\.\d+)?ms)?(?:\d+(?:\.\d+)?(us|µs))?(?:\d+(?:\.\d+)?ns)?$'
                  description: The waiting period between consecutive retry attempts when a request fails. This delay helps prevent overwhelming the ledger adapter during temporary failures
                  default: "60s"
                singleRequestTimeout:
                  type: string
                  pattern: '^-?(?:\d+(?:\.\d+)?h)?(?:\d+(?:\.\d+)?m)?(?:\d+(?:\.\d+)?s)?(?:\d+(?:\.\d+)?ms)?(?:\d+(?:\.\d+)?(us|µs))?(?:\d+(?:\.\d+)?ns)?$'
                  description: The maximum time allowed for each individual request attempt. If a single attempt exceeds this duration, it will be retried according to the backoff configuration
                  default: "90s"
                balanceSyncAllowed:
                  type: boolean
                  description: "Indicates whether balance synchronization is enabled for this ledger"
                  default: true
      responses:
        '200':
          description: successful operation


components:
  schemas:
    pinningAddress:
      type: object
      properties:
        address:
          type: string
          format: address
          minLength: 1
          maxLength: 1024
        port:
          type: integer
          minimum: 1
          maximum: 65535
        schemas:
          type: array
          uniqueItems: true
          minItems: 1
          items:
            type: string
            enum: [ http1.1, http2 ]
    pinningConfig:
      type: object
      minProperties: 1
      additionalProperties:
        $ref: '#/components/schemas/pinningConfigEntry'
    pinningConfigEntry:
      type: object
      required: [ token, address ]
      properties:
        token:
          type: string
          minLength: 1
          pattern: ^[A-Za-z0-9_-]{2,}(?:\.[A-Za-z0-9_-]{2,}){2}$
          format: jwt
        address:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/pinningAddress'
    pinningConfigUpdate:
      type: object
      minProperties: 1
      additionalProperties:
        oneOf:
          - $ref: '#/components/schemas/pinningConfigEntryUpdate'
        nullable: true
        x-go-type-skip-optional-pointer: true
        x-go-type: PinningConfigEntryUpdate
        x-go-type-import:
          path: github.com/owneraio/finp2p-core/apis/finapi/internal/api/common
          name: model
    pinningConfigEntryUpdate:
      type: object
      properties:
        token:
          type: string
          nullable: true
          x-go-type-skip-optional-pointer: true
          x-go-type: model.Nullable[string]
          x-go-type-import:
            path: github.com/owneraio/finp2p-core/apis/finapi/internal/api/common
            name: model
          format: jwt
          pattern: ^[A-Za-z0-9_-]{2,}(?:\.[A-Za-z0-9_-]{2,}){2}$
        address:
          nullable: true
          x-go-type-skip-optional-pointer: true
          x-go-type: model.Nullable[[]PinningAddress]
          x-go-type-import:
            path: github.com/owneraio/finp2p-core/apis/finapi/internal/api/common
            name: model
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/pinningAddress'
    approvalConfig:
      type: object
      minProperties: 1
      properties:
        tokenization:
          $ref: '#/components/schemas/roleApprovalConfig'
        payments:
          $ref: '#/components/schemas/roleApprovalConfig'
        investor:
          $ref: '#/components/schemas/roleApprovalConfig'
        custodian:
          $ref: '#/components/schemas/roleApprovalConfig'
    approvalConfigUpdate:
      type: object
      minProperties: 1
      properties:
        tokenization:
          # Use oneOf to define the property as EITHER the object OR null
          oneOf:
            - $ref: '#/components/schemas/nullableRoleApprovalConfigUpdate'
          nullable: true # For OpenAPI 3.0.1 compatibility/tooling
          x-go-type-skip-optional-pointer: true
          x-go-type: model.Nullable[NullableRoleApprovalConfigUpdate] # The desired Go type
          x-go-type-import:
