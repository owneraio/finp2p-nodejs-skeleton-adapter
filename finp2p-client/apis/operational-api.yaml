        propertyName: type
        mapping:
          hashList: '#/components/schemas/hashListTemplate'
          EIP712: '#/components/schemas/EIP712Template'

    hashListTemplate:
      description: 'ordered list of hash groups'
      required: [ type, hashGroups, hash ]
      type: object
      properties:
        type:
          type: string
          enum: [ "hashList" ]
        hashGroups:
          type: array
          items:
            $ref: '#/components/schemas/hashGroup'
        hash:
          type: string
          description: 'hex representation of the combined hash groups hash value'
          x-allowEmpty: true

    hashFunction:
      type: string
      enum:
        - unspecified
        - sha3_256
        - sha3-256
        - blake2b
        - keccak_256
        - keccak-256
      description: hash function types

    hashGroup:
      type: object
      required: [ hash, fields ]
      properties:
        hash:
          type: string
          description: 'hex representation of the hash group hash value'
          x-allowEmpty: true
        fields:
          description: 'list of fields by order they appear in the hash group'
          type: array
          items:
            $ref: '#/components/schemas/field'

    field:
      type: object
      description: 'describing a field in the hash group'
      required: [ name, type, value ]
      properties:
        name:
          type: string
          description: 'name of field'
        type:
          type: string
          enum: [ "string", "int", "bytes" ]
          description: 'type of field'
        value:
          type: string
          description: 'hex representation of the field value'
          x-allowEmpty: true
    EIP712Domain:
      type: object
      properties:
        name:
          type: string
          x-allowEmpty: true
        version:
          type: string
          x-allowEmpty: true
        chainId:
          type: integer
          format: uint64
        verifyingContract:
          type: string
          format: address
          x-allowEmpty: true
    EIP712TypedValue:
      oneOf:
        - $ref: '#/components/schemas/EIP712TypeString'
        - $ref: '#/components/schemas/EIP712TypeInteger'
        - $ref: '#/components/schemas/EIP712TypeBool'
        - $ref: '#/components/schemas/EIP712TypeByte'
        - $ref: '#/components/schemas/EIP712TypeObject'
        - $ref: '#/components/schemas/EIP712TypeArray'
    EIP712Types:
      type: object
      properties:
        definitions:
          type: array
          items:
            $ref: '#/components/schemas/EIP712TypeDefinition'
    EIP712TypeDefinition:
      type: object
      properties:
        name:
          type: string
          x-allowEmpty: true
        fields:
          type: array
          items:
            $ref: '#/components/schemas/EIP712FieldDefinition'
    EIP712FieldDefinition:
      type: object
      properties:
        name:
          type: string
          x-allowEmpty: true
        type:
          type: string
    EIP712Template:
      required: [ type, domain, message, primaryType, types, hash ]
      type: object
      properties:
        type:
          type: string
          enum: [ "EIP712" ]
        domain:
          $ref: '#/components/schemas/EIP712Domain'
        message:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/EIP712TypedValue'
        types:
          $ref: '#/components/schemas/EIP712Types'
        primaryType:
          type: string
          x-allowEmpty: true
        hash:
          type: string
          description: 'hex representation of template hash'
          x-allowEmpty: true

    EIP712TypeString:
      type: string
      pattern: '^(?:$|0([^x].*)?|[^0].*)$' # matches string that doesn't start with hexadecimal prefix
      x-allowEmpty: true

    EIP712TypeByte:
      type: string
      pattern: '^0x[0-9a-fA-F]+$' # matches hexadecimal string starting with '0x'
      minLength: 3
      maxLength: 320

    EIP712TypeInteger:
      type: integer

    EIP712TypeBool:
      type: boolean

    EIP712TypeObject:
      type: object
      additionalProperties:
        $ref: '#/components/schemas/EIP712TypedValue'

    EIP712TypeArray:
      type: array
      items:
        $ref: '#/components/schemas/EIP712TypedValue'

    receiptOutput:
      type: object
      required: [ type, id, quantity, details, timestamp ]
      properties:
        type:
          type: string
          enum: [ "receipt" ]
        id:
          type: string
          description: receipt id
        source:
          $ref: 'common-external-components.yaml#/components/schemas/finp2pAssetAccount'
        destination:
          $ref: 'common-external-components.yaml#/components/schemas/finp2pAssetAccount'
        quantity:
          type: string
        tradeDetails:
          $ref: 'common-external-components.yaml#/components/schemas/receiptTradeDetails'
        details:
          $ref: 'common-external-components.yaml#/components/schemas/receiptAssetDetails'
        operationType:
          type: string
          enum: [ 'hold', 'issue', 'redeem', 'release', 'transfer', 'unknown' ]
        operationRef:
          type: string
        timestamp:
          type: integer
        proof:
          $ref: '#/components/schemas/proofPolicy'

    proofPolicy:
      type: object
      discriminator:
        propertyName: type
        mapping:
          signatureProofPolicy: '#/components/schemas/signatureProofPolicy'
          noProofPolicy: '#/components/schemas/noProofPolicy'
      oneOf:
        - $ref: '#/components/schemas/signatureProofPolicy'
        - $ref: '#/components/schemas/noProofPolicy'

    noProofPolicy:
      type: object
      required: [ type ]
      properties:
        type:
          type: string
          enum: [ "noProofPolicy" ]
      description: "no proof validation required for this policy"

    signatureProofPolicy:
      type: object
      required: [ type, signature ]
      properties:
        type:
          type: string
          enum: [ "signatureProofPolicy" ]
        signature:
          $ref: '#/components/schemas/signature'

    ownerId:
      type: string
      description: 'The Owner resource id'
      pattern: '^[^:](?:.+):101:(?:.+)'
      example: 'bank-x:101:511c1d7f-4ed8-410d-887c-a10e3e499a01'

    instructionCompletionError:
      type: object
      required: [ type, code, message ]
      properties:
        type:
          type: string
          enum: [ 'error' ]
        code:
          type: integer
          description: 1 for failure in regApps validation, 2 for failure in intent validation, 3 failure in settlement, 4 failure in signature verification
        message:
          type: string

    executionPlanId:
      type: string
      description: 'The execution plan  resource id'
      pattern: '^[^:](?:.+):106:(?:.+)'
      example: 'bank-x:106:511c1d7f-4ed8-410d-887c-a10e3e499a01'

    assetId:
      type: string
      description: 'The Asset resource id'
      pattern: '^[^:](?:.+):102:(?:.+)'
      example: 'bank-x:102:f461a964-ae08-4e35-b690-24de06d973db'

    intentId:
      type: string
      description: 'The intent resource id'
      pattern: '^[^:](?:.+):105:(?:.+)'
      example: 'bank-x:105:f461a964-ae08-4e35-b690-24de06d973db'

    createPolicyResponse:
      type: object
      required: [ policyId ]
      properties:
        policyId:
          type: string
          maxLength: 50
          description: unique policy id

    updatePolicyResponse:
      type: object
      required: [ version ]
      properties:
        version:
          type: integer
          format: uint32
          description: the updated policy version

    tradingPolicy:
      type: object
      required: [ policyId, description, priority, isDefault, intent, instructions ]
      properties:
        policyId:
          type: string
          maxLength: 50
          description: unique policy id
        priority:
          type: integer
          format: uint32
          maximum: 1000000
          description: priority of the policy
        intent:
          $ref: 'common-external-components.yaml#/components/schemas/intentType'
        description:
          type: string
          maxLength: 255
          description: "description of the policy"
        isDefault:
          type: boolean
          description: "whether policy should be applied to all assets"
        version:
          type: integer
          format: uint32
          description: "version of the trading policy"
        instructions:
          type: array
          items:
            $ref: '#/components/schemas/instruction'
        assetMatchingCriteria:
          $ref: '#/components/schemas/assetMatchingCriteria'
        constraints:
          $ref: '#/components/schemas/constraints'
        settlementStrategy:
          type: array
          items:
            $ref: '#/components/schemas/settlementStrategyType'

    createPolicyRequest:
      type: object
      required: [ policyId, description, priority, intent, instructions ]
      properties:
        policyId:
          type: string
          maxLength: 50
          description: unique policy id
        priority:
          type: integer
          format: uint32
          maximum: 1000000
          description: priority of the policy
        intent:
          $ref: 'common-external-components.yaml#/components/schemas/intentType'
        description:
          type: string
          maxLength: 255
          description: "description of the policy"
        isDefault:
          type: boolean
          description: "whether policy should be applied to all assets"
        instructions:
          type: array
          items:
            $ref: '#/components/schemas/instruction'
        assetMatchingCriteria:
          $ref: '#/components/schemas/assetMatchingCriteria'
        constraints:
          $ref: '#/components/schemas/constraints'
        settlementStrategy:
          type: array
          items:
            $ref: '#/components/schemas/settlementStrategyType'

    updatePolicyRequest:
      type: object
      required: [ policyId, description, priority, intent, instructions, version, assetMatchingCriteria ]
      properties:
        policyId:
          type: string
          maxLength: 50
          description: unique policy id
        priority:
          type: integer
          format: uint32
          maximum: 1000000
          description: priority of the policy
        intent:
          type: string
          enum: [ 'primarySale', 'buyingIntent', 'sellingIntent', 'loanIntent', 'redemptionIntent', 'privateOfferIntent', 'requestForTransferIntent' ]
        description:
          type: string
          maxLength: 255
          description: "description of the policy"
        isDefault:
          type: boolean
          description: "whether policy should be applied to all assets"
        instructions:
          type: array
          items:
            $ref: '#/components/schemas/instruction'
        assetMatchingCriteria:
          $ref: '#/components/schemas/assetMatchingCriteria'
        constraints:
          $ref: '#/components/schemas/constraints'
        version:
          type: integer
          format: uint32
          description: "new version of the trading policy"
        settlementStrategy:
          type: array
          items:
            $ref: '#/components/schemas/settlementStrategyType'

    settlementStrategyType:
        type: string
        enum: [ 'NOSETTLEMENT', 'PARTIAL', 'FULL' ]
        description: type of settlement strategy

    constraints:
      type: object
      nullable: true
      properties:
        allowedCounterOrganizations:
          nullable: false
          type: array
          items:
            type: string
        allowedCounterAssetTypes:
          nullable: false
          type: array
          items:
            type: string
        allowedCounterLedgerAssetIdentifiers:
          type: array
          items:
            $ref: 'common-external-components.yaml#/components/schemas/ledgerAssetIdentifier'
        allowedFinancialAssetIdentifiers:
          type: array
          items:
            $ref: 'common-external-components.yaml#/components/schemas/financialAssetIdentifier'

    assetMatchingCriteria:
      type: object
      nullable: true
      properties:
        assetNameRegexp:
          type: string
          nullable: true
          maxLength: 255
          minLength: 2
        assetCodes:
          nullable: false
          type: array
          items:
            type: string
            maxLength: 255
            minLength: 2
        ledgerAssetIdentifiers:
          type: array
          items:
            $ref : 'common-external-components.yaml#/components/schemas/ledgerAssetIdentifier'
        financialAssetIdentifiers:
          type: array
          items:
            $ref : 'common-external-components.yaml#/components/schemas/financialAssetIdentifier'

    accountSelector:
      type: object
      required: [ path, type ]
      properties:
        type:
          type: "string"
          enum: [ "account" ]
        path:
          type: string
          minLength: 1
          maxLength: 1000
          pattern: '^([a-z][a-z0-9_]*)(\.[a-z][a-z0-9_]*)*$'

    assetSelector:
      type: object
      required: [ path, type ]
      properties:
        type:
          type: "string"
          enum: [ "asset" ]
        path:
          type: string
          minLength: 1
          maxLength: 1000
          pattern: '^([a-z][a-z0-9_]*)(\.[a-z][a-z0-9_]*)*$'


    selector:
      type: object
      nullable: true
      oneOf:
        - $ref: '#/components/schemas/accountSelector'
        - $ref: '#/components/schemas/assetSelector'
      discriminator:
        propertyName: type
        mapping:
          account: '#/components/schemas/accountSelector'
          asset: '#/components/schemas/assetSelector'

    instructionTarget:
      type: object
      required: [selectors]
      properties:
        version:
          type: string
          maxLength: 50
          x-go-type-skip-optional-pointer: true
        selectors:
          type: array
          items:
            $ref: '#/components/schemas/selector'

    instruction:
      type: object
      required: [ sequence, instruction, onSuccess ]
      properties:
        instruction:
          type: string
          enum: ["Hold", "Transfer", "Release", "Await", "Issue", "RevertHold", "Redeem"]
        sequence:
          type: integer
          format: uint32
        executors:
          x-go-type-skip-optional-pointer: true
          type: array
          items:
            type: string
            enum: ["self", "counterparty"]
        target:
          $ref: '#/components/schemas/instructionTarget'
        timeout:
          $ref: '#/components/schemas/tolerance'
        onFailure:
          $ref: '#/components/schemas/transition'
        onSuccess:
          $ref: '#/components/schemas/transition'
        onTimeout:
          $ref: '#/components/schemas/transition'
        details:
          discriminator:
            propertyName: type
            mapping:
              hold: '#/components/schemas/holdOperationDetails'
              transfer: '#/components/schemas/transferOperationDetails'
              issue: '#/components/schemas/issueOperationDetails'
              release: '#/components/schemas/releaseOperationDetails'
              await: '#/components/schemas/awaitOperationDetails'
              revertHold: '#/components/schemas/revertHoldOperationDetails'
          oneOf:
            - $ref: '#/components/schemas/holdOperationDetails'
            - $ref: '#/components/schemas/transferOperationDetails'
            - $ref: '#/components/schemas/issueOperationDetails'
            - $ref: '#/components/schemas/releaseOperationDetails'
            - $ref: '#/components/schemas/awaitOperationDetails'
            - $ref: '#/components/schemas/revertHoldOperationDetails'

    holdOperationDetails:
      type: object
      nullable: true
      required: [type]
      properties:
        type:
          type: string
          enum: ["hold"]
        accountRole:
          x-go-type-skip-optional-pointer: true
          type: string

    releaseOperationDetails:
      type: object
      nullable: true
      required: [ type ]
      properties:
        type:
          type: string
          enum: [ "release" ]
        holdInstructionSequence:
          type: integer
          format: uin32
        accountRole:
          type: string

    transferOperationDetails:
      type: object
      nullable: true
      required: [type]
      properties:
        type:
          type: string
          enum: [ "transfer" ]
        accountRole:
          x-go-type-skip-optional-pointer: true
          type: string

    issueOperationDetails:
      type: object
      nullable: true
      required: [ type ]
      properties:
        type:
          type: string
          enum: [ "issue" ]
        accountRole:
          type: string

    revertHoldOperationDetails:
      type: object
      nullable: true
      required: [ type ]
      properties:
        type:
          type: string
          enum: [ "revertHold" ]
        holdInstructionSequence:
          type: integer
          format: uin32

    awaitOperationDetails:
      type: object
      nullable: true
      required: [ type ]
      properties:
        type:
          type: string
          enum: [ "await" ]
        awaitTarget:
          type: string
          enum: ["close", "open"]
        awaitBackwardScheduling:
          $ref: '#/components/schemas/AwaitBackwardScheduling'

    AwaitBackwardScheduling:
      type: object
      nullable: true
      required: [ maxAllowedDuration, schedule ]
      properties:
        maxAllowedDuration:
          type: string
          format: duration
          description: duration in seconds (e.g., "3.045646s")
          pattern: '^\d+(\.\d{1,9})?s$'
        schedule:
          type: string
          format: duration
          description: duration in seconds (e.g., "3.045646s")
          pattern: '^\d+(\.\d{1,9})?s$'

    transition:
      type: object
      nullable: true
      discriminator:
        propertyName: type
        mapping:
          instruction: '#/components/schemas/instructionTransition'
          status: '#/components/schemas/statusTransition'
      oneOf:
        - $ref: '#/components/schemas/instructionTransition'
        - $ref: '#/components/schemas/statusTransition'

    statusTransition:
      type: object
      nullable: true
      required: [type, status]
      properties:
         type:
           type: string
           enum: ["status"]
         status:
           type: string
           enum: ["proposed", "approved", "rejected", "completed", "failed", "halted"]

    instructionTransition:
      type: object
      nullable: true
      required: [type, sequence]
      properties:
        type:
          type: string
          enum: [ "instruction" ]
        sequence:
          type: integer
          format: uint32

    tolerance:
      type: object
      nullable: true
      required: [value]
      properties:
        value:
          type: integer
          format: uint32
        options:
          $ref: '#/components/schemas/toleranceOptions'

    toleranceOptions:
      type: object
      properties:
        allowedValues:
          type: array
          nullable: false
          items:
            type: integer
            format: uint32
        percentageDeviation:
          type: integer
          format: uint32
        absoluteDeviation:
          type: integer
          format: uint32
      oneOf:
        - required: [absoluteDeviation]
        - required: [percentageDeviation]

    operationStatusCallback:
      type: object
      oneOf:
        - $ref: 'dlt-adapter-api.yaml#/components/schemas/operationStatus'
        - $ref: 'custody-adapter-api.yaml#/components/schemas/operationStatus'
