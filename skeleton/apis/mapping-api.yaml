openapi: 3.0.1
info:
  title: Adapter Mapping API
  description: >-
    Operational mapping API for FinP2P adapter identity and network provisioning.
    Associates FinP2P investor identities (finId) with ledger-specific
    account identifiers, and registers network execution environments.
  termsOfService: 'https://ownera.io/terms/'
  contact:
    email: support@ownera.io
  version: 0.2.0
tags:
  - name: mapping
    description: Owner identity mapping operations
  - name: network
    description: Network registry mapping operations

paths:
  /mapping/owners:
    post:
      tags:
        - mapping
      summary: Create, update, or delete owner mapping
      description: >-
        Associate a FinP2P finId with ledger-specific account identifiers.
        Setting status to "inactive" deletes the mapping.
      operationId: createOwnerMapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createOwnerMappingRequest'
      responses:
        '200':
          description: Mapping created, updated, or deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/createOwnerMappingResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'

    get:
      tags:
        - mapping
      summary: Query owner mappings
      description: Retrieve provisioned owner mappings, optionally filtered by finId list.
      operationId: getOwnerMappings
      parameters:
        - name: finIds
          in: query
          required: false
          description: Comma-separated list of finIds to filter by
          schema:
            type: string
      responses:
        '200':
          description: List of owner mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ownerMapping'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'

  /mapping/fields:
    get:
      tags:
        - mapping
      summary: Get supported account mapping fields
      description: Returns metadata describing the structure of account mapping fields.
      operationId: getMappingFields
      responses:
        '200':
          description: List of account mapping field descriptors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/mappingField'

  /mapping/networks:
    post:
      tags:
        - network
      summary: Create, update, or delete network mapping
      description: >-
        Register or update a network execution environment.
        Setting status to "inactive" deletes the mapping.
      operationId: createNetworkMapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/createNetworkMappingRequest'
      responses:
        '200':
          description: Network mapping created, updated, or deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/networkMapping'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'

    get:
      tags:
        - network
      summary: Query network mappings
      description: Retrieve registered network mappings, optionally filtered by networkId list.
      operationId: getNetworkMappings
      parameters:
        - name: networkIds
          in: query
          required: false
          description: Comma-separated list of networkIds to filter by
          schema:
            type: string
      responses:
        '200':
          description: List of network mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/networkMapping'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'

  /mapping/network-fields:
    get:
      tags:
        - network
      summary: Get supported network mapping fields
      description: Returns metadata describing the network mapping fields supported by this adapter.
      operationId: getNetworkMappingFields
      responses:
        '200':
          description: List of network mapping field descriptors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/mappingField'

components:
  schemas:
    accountMappings:
      type: object
      additionalProperties:
        type: string
      description: >-
        Key-value pairs of adapter-specific account identifiers
        (e.g. ledgerAccountId, custodyAccountId)

    networkMappings:
      type: object
      additionalProperties:
        type: string
      description: >-
        Key-value pairs of adapter-specific network configuration
        (e.g. chainId, rpcUrl, submitMode)

    ownerMapping:
      type: object
      required:
        - finId
        - accountMappings
      properties:
        finId:
          type: string
          description: FinP2P identity (hex secp256k1 compressed public key)
        accountMappings:
          $ref: '#/components/schemas/accountMappings'

    networkMapping:
      type: object
      required:
        - networkId
        - networkMappings
      properties:
        networkId:
          type: string
          description: Stable network identifier (e.g. eip155:1, besu:corp-settlement)
        networkMappings:
          $ref: '#/components/schemas/networkMappings'

    createOwnerMappingRequest:
      type: object
      required:
        - finId
        - accountMappings
      properties:
        finId:
          type: string
          description: FinP2P identity (hex secp256k1 compressed public key)
        status:
          type: string
          enum: [active, inactive]
          default: active
          description: Set to "inactive" to delete the mapping
        accountMappings:
          $ref: '#/components/schemas/accountMappings'

    createOwnerMappingResponse:
      allOf:
        - $ref: '#/components/schemas/ownerMapping'
        - type: object
          properties:
            credentialCid:
              type: string
              description: Contract ID of the on-ledger FinID credential (or "none")
            credentialStatus:
              type: string
              description: >-
                Status of on-ledger credential provisioning
                (e.g. "created", "existing", "skipped")

    createNetworkMappingRequest:
      type: object
      required:
        - networkId
        - networkMappings
      properties:
        networkId:
          type: string
          description: Stable network identifier (e.g. eip155:1, besu:corp-settlement)
        status:
          type: string
          enum: [active, inactive]
          default: active
          description: Set to "inactive" to delete the mapping
        networkMappings:
          $ref: '#/components/schemas/networkMappings'

    mappingField:
      type: object
      required:
        - field
        - description
        - exampleValue
      properties:
        field:
          type: string
          description: The field name within the mapping
        description:
          type: string
          description: Human-readable description of the field
        exampleValue:
          type: string
          description: Example value for the field

    errorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Error message
